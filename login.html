{% extends "base.html" %}

{% block title %}Login - AI Email Generator{% endblock %}

{% block content %}
<div class="auth-container fade-in">
    <div class="auth-card glassmorphism">
        <div class="auth-header">
            <i class="fa-solid fa-user-lock fa-3x"></i>
            <h2>Welcome Back</h2>
            <p>Sign in to generate professional emails</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block glow-effect">
                <span>Login</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
